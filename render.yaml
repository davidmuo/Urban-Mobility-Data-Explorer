services:
  - type: web
    name: urban-mobility-api
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn -c gunicorn_config.py run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: urban-mobility-frontend
    env: static
    rootDir: frontend
    staticPublishPath: .
    buildCommand: echo 'static site'
